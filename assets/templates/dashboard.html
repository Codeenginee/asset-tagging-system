<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Image Processing Dashboard</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link href="https://cdn.jsdelivr.net/npm/@yaireo/tagify/dist/tagify.css" rel="stylesheet" type="text/css" />
    
    <style>
        /* Modern UI Tweaks */
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
        }
        .custom-card {
            border-radius: 16px;
            backdrop-filter: blur(10px);
            background-color: rgba(255, 255, 255, 0.95);
        }
        /* Customizing Tagify to match Bootstrap's clean focus states */
        .tagify {
            padding: 0.375rem 0.75rem;
            border-radius: 0.375rem;
            border: 1px solid #dee2e6;
            background: #fff;
        }
        .tagify--focus {
            border-color: #86b7fe;
            box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.25);
        }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="row justify-content-center align-items-center style-row" style="min-height: 80vh;">
        <div class="col-md-8 col-lg-6">
            
            <div class="card custom-card shadow-lg border-0">
                <div class="card-body p-4 p-md-5">
                    
                    <div class="text-center mb-4">
                        <h2 class="text-dark fw-bold mb-1">Image Processor</h2>
                        <p class="text-muted small">Specify target classes for processing</p>
                    </div>
                    
                    <form method="POST">
                        {% csrf_token %}
                        
                        <div class="mb-4">
                            <label for="tagsInput" class="form-label text-dark fw-semibold small">Active Target Tags</label>
                            
                            <input 
                                id="tagsInput"
                                name="tags" 
                                class="form-control" 
                                placeholder="Type a tag and press Enter" 
                                value="person, laptop, car, tree">
                                
                            <div class="form-text text-muted mt-2">
                                Press <kbd>Enter</kbd> or use a comma to separate multiple tags. Click the <span class="badge bg-secondary">x</span> to remove.
                            </div>
                        </div>
                        
                        <div class="d-grid mt-5">
                            <button type="submit" class="btn btn-primary btn-lg fw-medium shadow-sm py-3">
                                Process Images
                            </button>
                        </div>
                        
                    </form>
                    
                </div>
            </div>
            </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@yaireo/tagify"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    // Initialize Tagify on our standard input field
    const input = document.querySelector('#tagsInput');
    const tagify = new Tagify(input, {
        delimiters: ",| ", // Allows users to hit Enter, comma, or space to generate a tag
        maxTags: 20,       // Prevents the interface from overloading
        dropdown: {
            maxItems: 5,
            enabled: 0      // Suggestion dropdown triggers immediately on focus if you want to feed it options later
        }
    });
</script>
</body>
</html>
