<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Image Processing Dashboard</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link href="https://cdn.jsdelivr.net/npm/@yaireo/tagify/dist/tagify.css" rel="stylesheet" type="text/css" />
    
    <style>
        /* Modern UI Tweaks */
        body{
    margin:0;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;

    background:linear-gradient(135deg,#4f46e5,#3b82f6,#06b6d4);
    font-family:'Segoe UI',sans-serif;
}

/* Glass Card */

.custom-card{

    width:100%;
    max-width:380px;

    border:none;

    border-radius:20px;

    background:rgba(255,255,255,.18);

    backdrop-filter:blur(18px);

    -webkit-backdrop-filter:blur(18px);

    border:1px solid rgba(255,255,255,.25);

    box-shadow:0 20px 40px rgba(0,0,0,.18);

    transition:.3s;

}

.custom-card:hover{

    transform:translateY(-5px);

}

.card-body{

    padding:30px;

}

.logo{

    width:65px;
    height:65px;

    margin:auto;

    border-radius:50%;

    background:rgba(255,255,255,.18);

    display:flex;

    justify-content:center;
    align-items:center;

    font-size:30px;

    color:#fff;

    margin-bottom:15px;

}

.title{

    color:#fff;

    font-size:26px;

    font-weight:700;

}

.subtitle{

    color:#f1f1f1;

    font-size:14px;

}

.form-label{

    color:#fff;

    font-weight:600;

}

.tagify{

    border-radius:10px;

    background:rgba(255,255,255,.90);

    border:none;

}

.tagify--focus{

    box-shadow:0 0 0 .2rem rgba(255,255,255,.30);

}

.form-text{

    color:#f8f9fa!important;

}

.btn-primary{

    height:48px;

    border:none;

    border-radius:10px;

    font-weight:600;

    background:#fff;

    color:#2563eb;

}

.btn-primary:hover{

    background:#2563eb;

    color:#fff;

}
    </style>
</head>
<body>

<div class="container py-5">
    <div class="row justify-content-center align-items-center style-row" style="min-height: 80vh;">
        <div class="col-md-8 col-lg-6">
            
            <div class="card custom-card shadow-lg border-0">
                <div class="card-body p-4 p-md-5">
                    
                    <div class="text-center mb-4">
                        <div class="logo">
                            🤖
                        </div>
                        <h2 class="title">AI Asset Tagging</h2>
                        <p class="subtitle">Specify the objects to detect in uploaded images</p>
                    </div>
                    
                    <form method="POST">
                        {% csrf_token %}
                        
                        <div class="mb-4">
                            <label for="tagsInput" class="form-label text-dark fw-semibold small">Active Target Tags</label>
                            
                            <input 
                                id="tagsInput"
                                name="tags" 
                                class="form-control" 
                                placeholder="Type a tag and press Enter" 
                                value="person, laptop, car, tree">
                                
                            <div class="form-text text-muted mt-2">
                                Press <kbd>Enter</kbd> or use a comma to separate multiple tags. Click the <span class="badge bg-secondary">x</span> to remove.
                            </div>
                        </div>
                        
                        <div class="d-grid mt-4">
                            <button type="submit" class="btn btn-primary">   
                                🚀 Process Images              
                            </button>
                        </div>
                        
                    </form>
                    
                </div>
            </div>
            </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@yaireo/tagify"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    // Initialize Tagify on our standard input field
    const input = document.querySelector('#tagsInput');
    const tagify = new Tagify(input, {
        delimiters: ",| ", // Allows users to hit Enter, comma, or space to generate a tag
        maxTags: 20,       // Prevents the interface from overloading
        dropdown: {
            maxItems: 5,
            enabled: 0      // Suggestion dropdown triggers immediately on focus if you want to feed it options later
        }
    });
</script>
</body>
</html>
