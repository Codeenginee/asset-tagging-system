<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Register | AI Asset Tagging System</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{

margin:0;
padding:0;
font-family:Arial,Helvetica,sans-serif;
background:linear-gradient(135deg,#0f172a,#2563eb);
height:100vh;
display:flex;
justify-content:center;
align-items:center;

}

.register-card{

background:white;
width:450px;
padding:40px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,.3);

}

h2{

text-align:center;
color:#0d6efd;
font-weight:bold;
margin-bottom:30px;

}

.form-control{

height:50px;
margin-bottom:20px;
border-radius:10px;

}

.btn-register{

width:100%;
height:50px;
font-size:18px;
border-radius:10px;

}

.login-link{

text-align:center;
margin-top:20px;

}

.login-link a{

text-decoration:none;
font-weight:bold;

}

.back{

text-align:center;
margin-top:15px;

}

.back a{

text-decoration:none;

}

.errorlist{

color:red;
list-style:none;
padding:0;
margin-bottom:10px;

}

</style>

</head>

<body>

<div class="register-card">

<h2>Create Account</h2>

<form method="POST">

{% csrf_token %}

{{ form.non_field_errors }}

<label>Username</label>

{{ form.username }}

<label>Email</label>

{{ form.email }}

<label>Password</label>

<div class="input-group mb-3">

{{ form.password1 }}

<button
type="button"
class="btn btn-outline-secondary"
onclick="togglePassword('id_password1')">

👁

</button>

</div>

<label>Confirm Password</label>

<div class="input-group mb-3">

{{ form.password2 }}

<button
type="button"
class="btn btn-outline-secondary"
onclick="togglePassword('id_password2')">

👁

</button>

</div>

<button
type="submit"
class="btn btn-success btn-register">

Create Account

</button>

</form>

<div class="login-link">

Already have an account?

<a href="{% url 'login' %}">

Login

</a>

</div>

<div class="back">

<a href="{% url 'home' %}">

← Back to Home

</a>

</div>

</div>

<script>

function togglePassword(id){

var x=document.getElementById(id);

if(x.type==="password"){

x.type="text";

}

else{

x.type="password";

}

}

</script>

</body>

</html>
