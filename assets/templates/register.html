<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Register | AI Asset Tagging System</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    margin:0;
    padding:0;
    font-family:Arial,Helvetica,sans-serif;
    background:linear-gradient(135deg,#0f172a,#2563eb);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.register-card{
    background:#fff;
    width:450px;
    padding:35px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,.25);
}

h2{
    text-align:center;
    color:#0d6efd;
    margin-bottom:20px;
    font-weight:bold;
}

.form-control{
    height:45px;
    border-radius:8px;
}

.input-group{
    margin-bottom:15px;
}

.btn-register{
    width:100%;
    height:45px;
    border-radius:8px;
    font-size:17px;
}

.login-link,
.back{
    text-align:center;
    margin-top:15px;
}

.error-list{
    background:#ffe5e5;
    color:#c62828;
    padding:10px;
    border-radius:8px;
    margin-bottom:15px;
}

</style>

</head>

<body>

<div class="register-card">

<h2>Create Account</h2>

{% if form.errors %}
<div class="error-list">
    <ul class="mb-0">
        {% for field in form %}
            {% for error in field.errors %}
                <li>{{ error }}</li>
            {% endfor %}
        {% endfor %}

        {% for error in form.non_field_errors %}
            <li>{{ error }}</li>
        {% endfor %}
    </ul>
</div>
{% endif %}

<form method="POST">

{% csrf_token %}

<div class="mb-3">

<label>Username</label>

<input
type="text"
name="username"
class="form-control"
value="{{ form.username.value|default:'' }}"
required>

</div>

<div class="mb-3">

<label>Email</label>

<input
type="email"
name="email"
class="form-control"
value="{{ form.email.value|default:'' }}"
required>

</div>

<div class="mb-3">

<label>Password</label>

<div class="input-group">

<input
type="password"
name="password1"
id="password1"
class="form-control"
required>

<button
type="button"
class="btn btn-outline-secondary"
onclick="togglePassword('password1')">

👁

</button>

</div>

</div>

<div class="mb-3">

<label>Confirm Password</label>

<div class="input-group">

<input
type="password"
name="password2"
id="password2"
class="form-control"
required>

<button
type="button"
class="btn btn-outline-secondary"
onclick="togglePassword('password2')">

👁

</button>

</div>

</div>

<button
type="submit"
class="btn btn-success btn-register">

Create Account

</button>

</form>

<div class="login-link">

Already have an account?

<a href="{% url 'login' %}">

Login

</a>

</div>

<div class="back">

<a href="{% url 'home' %}">

← Back to Home

</a>

</div>

</div>

<script>

function togglePassword(id){

const input=document.getElementById(id);

if(input.type==="password"){

input.type="text";

}else{

input.type="password";

}

}

</script>

</body>

</html>
