<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Register | AI Asset Tagging System</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    margin:0;
    padding:0;
    font-family:Arial,Helvetica,sans-serif;
    background:linear-gradient(135deg,#0f172a,#2563eb);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.register-card{
    background:#fff;
    width:450px;
    padding:35px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,.25);
}

h2{
    text-align:center;
    color:#0d6efd;
    font-size:30px;
    margin-bottom:15px;
}

label{
    font-size:14px;
    font-weight:600;
    margin-bottom:3px;
}

.form-control{
    width:100%;
    height:40px;
    border-radius:8px;
    margin-bottom:10px;
}

.input-group{
    margin-bottom:10px;
}

.input-group .btn{
    width:45px;
}

.btn-register{
    width:100%;
    height:42px;
    border-radius:8px;
    font-size:16px;
    margin-top:8px;
}

.login-link,
.back{
    text-align:center;
    margin-top:10px;
    font-size:14px;
}


/* Tablet */
@media (max-width:768px){

    .register-card{
        width:400px;
        padding:30px;
    }

}

/* Mobile */
@media (max-width:480px){

    .register-card{
        width:90%;
        padding:20px;
    }

    h2{
        font-size:30px;
    }

    .form-control{
        height:42px;
    }

    .btn-register{
        height:42px;
    }

}

</style>

</head>

<body>

<div class="register-card">

<h2>Create Account</h2>

<form method="POST">

    {% csrf_token %}

    <div class="mb-3">

        <label class="form-label">Username</label>

        <input
            type="text"
            name="username"
            class="form-control"
            placeholder="Enter Username"
            required>

    </div>

    <div class="mb-3">

        <label class="form-label">Email</label>

        <input
            type="email"
            name="email"
            class="form-control"
            placeholder="Enter Email"
            required>

    </div>

    <div class="mb-3">

        <label class="form-label">Password</label>

        <div class="input-group">

            <input
                type="password"
                name="password1"
                id="id_password1"
                class="form-control"
                placeholder="Enter Password"
                required>

            <button
                type="button"
                class="btn btn-outline-secondary"
                onclick="togglePassword('id_password1')">

                👁

            </button>

        </div>

    </div>

    <div class="mb-3">

        <label class="form-label">Confirm Password</label>

        <div class="input-group">

            <input
                type="password"
                name="password2"
                id="id_password2"
                class="form-control"
                placeholder="Confirm Password"
                required>

            <button
                type="button"
                class="btn btn-outline-secondary"
                onclick="togglePassword('id_password2')">

                👁

            </button>

        </div>

    </div>

    <button
        type="submit"
        class="btn btn-success btn-register">

        Create Account

    </button>

</form>
<div class="login-link">

Already have an account?

<a href="{% url 'login' %}">

Login

</a>

</div>

<div class="back">

<a href="{% url 'home' %}">

← Back to Home

</a>

</div>

</div>

<script>

function togglePassword(id){

var x=document.getElementById(id);

if(x.type==="password"){

x.type="text";

}

else{

x.type="password";

}

}

</script>

</body>

</html>
