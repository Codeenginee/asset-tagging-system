 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Images</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    
    <style>
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        
        /* Interactive Drag & Drop Area Box */
        .upload-dropzone {
            border: 2px dashed #0d6efd;
            background-color: #f8f9fa;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
            position: relative;
        }
        
        .upload-dropzone:hover, .upload-dropzone.dragover {
            background-color: #e9ecef;
            border-color: #0a58ca;
        }

        /* Hiding the ugly default native input file button completely */
        .hidden-file-input {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }

        .custom-card {
            border: none;
            border-radius: 16px;
            background-color: rgba(255, 255, 255, 0.98);
        }
    </style>
</head>
<body>

<div class="container my-5">
    <div class="row justify-content-center mx-0">
        <div class="col-12 col-md-8 col-lg-6 col-xl-5 px-0 px-sm-3">
            
            <div class="card custom-card shadow-lg">
                <div class="card-body p-4 p-sm-5">
                    
                    <div class="text-center mb-4">
                        <div class="text-primary mb-2">
                            <i class="bi bi-cloud-arrow-up-fill fs-1"></i>
                        </div>
                        <h2 class="text-dark fw-bold mb-1 fs-3">Batch Image Upload</h2>
                        <p class="text-muted small">Upload multiple graphic items down below</p>
                    </div>

                    <form method="POST" enctype="multipart/form-data">
                        {% csrf_token %}
                        
                        <div class="upload-dropzone p-4 p-sm-5 text-center mb-4" id="dropzone">
                            
                            <input 
                                type="file" 
                                name="images" 
                                id="fileInput" 
                                class="hidden-file-input" 
                                multiple 
                                accept="image/*">
                            
                            <i class="bi bi-images fs-2 text-secondary mb-3 d-block"></i>
                            <span class="fw-semibold text-dark d-block mb-1">Drag & drop files here</span>
                            <span class="text-muted small d-block mb-3">or click to browse your storage</span>
                            <span class="badge bg-light text-secondary border">Supports PNG, JPG, WEBP</span>
                        </div>
                        
                        <div id="fileStatusContainer" class="d-none mb-4">
                            <div class="d-flex align-items-center justify-content-between mb-2">
                                <span class="small fw-bold text-dark" id="fileCountLabel">0 Files Selected</span>
                                <button type="button" class="btn btn-sm btn-link text-danger text-decoration-none p-0" id="clearFilesBtn">Clear All</button>
                            </div>
                            <div class="list-group list-group-flush border rounded overflow-auto" id="filePreviewList" style="max-height: 120px; font-size: 0.85rem;">
                                </div>
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary btn-lg fw-medium shadow-sm py-3 fs-6" id="submitBtn" disabled>
                                <i class="bi bi-upload me-2"></i> Upload Batch
                            </button>
                        </div>
                        
                    </form>
                    
                </div>
            </div>
            
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    const fileInput = document.getElementById('fileInput');
    const dropzone = document.getElementById('dropzone');
    const fileStatusContainer = document.getElementById('fileStatusContainer');
    const fileCountLabel = document.getElementById('fileCountLabel');
    const filePreviewList = document.getElementById('filePreviewList');
    const submitBtn = document.getElementById('submitBtn');
    const clearFilesBtn = document.getElementById('clearFilesBtn');

    // Drag over state visual additions
    ['dragenter', 'dragover'].forEach(eventName => {
        dropzone.addEventListener(eventName, () => dropzone.classList.add('dragover'), false);
    });
    ['dragleave', 'drop'].forEach(eventName => {
        dropzone.addEventListener(eventName, () => dropzone.classList.remove('dragover'), false);
    });

    // Handle incoming file selection changes
    fileInput.addEventListener('change', updateFileStatusUI);

    function updateFileStatusUI() {
        const files = fileInput.files;
        filePreviewList.innerHTML = ''; // Reset list

        if (files.length > 0) {
            fileStatusContainer.classList.remove('d-none');
            fileCountLabel.innerHTML = `<i class="bi bi-check-circle-fill text-success me-1"></i> ${files.length} File(s) Staged`;
            submitBtn.removeAttribute('disabled');

            // Render out list names for clean user review updates
            Array.from(files).forEach(file => {
                const listItem = document.createElement('div');
                listItem.className = 'list-group-item bg-light text-truncate py-2 d-flex align-items-center gap-2';
                listItem.innerHTML = `<i class="bi bi-image text-muted"></i> <span>${file.name}</span>`;
                filePreviewList.appendChild(listItem);
            });
        } else {
            resetUploadState();
        }
    }

    function resetUploadState() {
        fileInput.value = '';
        fileStatusContainer.classList.add('d-none');
        submitBtn.setAttribute('disabled', 'true');
        filePreviewList.innerHTML = '';
    }

    clearFilesBtn.addEventListener('click', resetUploadState);
</script>
</body>
</html>
