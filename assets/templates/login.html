<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login | AI Asset Tagging System</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{

margin:0;
padding:0;
font-family:Arial,Helvetica,sans-serif;
background:linear-gradient(135deg,#0f172a,#2563eb);
height:100vh;
display:flex;
justify-content:center;
align-items:center;

}

.login-card{

background:white;
padding:40px;
border-radius:20px;
width:400px;
box-shadow:0 10px 30px rgba(0,0,0,.3);

}

h2{

text-align:center;
margin-bottom:30px;
font-weight:bold;
color:#0d6efd;

}

.form-control{

height:50px;
margin-bottom:20px;
border-radius:10px;

}

.btn-login{

width:100%;
height:50px;
font-size:18px;
border-radius:10px;

}

.register{

text-align:center;
margin-top:20px;

}

.register a{

text-decoration:none;
font-weight:bold;

}

.back{

text-align:center;
margin-top:15px;

}

.back a{

text-decoration:none;

}

.error{

color:red;
text-align:center;
margin-bottom:15px;

}

</style>

</head>

<body>

<div class="login-card">

<h2>Login</h2>

{% if error %}

<div class="error">

{{ error }}

</div>

{% endif %}

<form method="POST">

{% csrf_token %}

<input
type="text"
name="username"
class="form-control"
placeholder="Username"
required>

<div class="input-group mb-3">

<input
type="password"
name="password"
id="password"
class="form-control"
placeholder="Password"
required>

<button
type="button"
class="btn btn-outline-secondary"
onclick="togglePassword()">

👁

</button>

</div>

<button
type="submit"
class="btn btn-primary btn-login">

Login

</button>

</form>

<div class="register">

Don't have an account?

<a href="{% url 'register' %}">

Register

</a>

</div>

<div class="back">

<a href="{% url 'home' %}">

← Back to Home

</a>

</div>

</div>

<script>

function togglePassword(){

var x=document.getElementById("password");

if(x.type==="password"){

x.type="text";

}

else{

x.type="password";

}

}

</script>

</body>

</html>
